<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8f0e1e" />
  <title>星願擲筊所｜星展知識抽獎</title>
  <style>
    :root {
      --dbs-red: #e31837;
      --deep-red: #8f0e1e;
      --wine: #4d0712;
      --gold: #d9a441;
      --gold-light: #f5d98c;
      --ivory: #fffaf0;
      --ink: #251b19;
      --muted: #7a6965;
      --green: #1f7a55;
      --shadow: 0 24px 70px rgba(62, 7, 18, 0.26);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 8%, rgba(245, 217, 140, .35), transparent 28%),
        radial-gradient(circle at 85% 14%, rgba(227, 24, 55, .16), transparent 30%),
        linear-gradient(145deg, #fffaf0 0%, #f7ecdc 52%, #f8e3e4 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(2px);
      opacity: .55;
      z-index: 0;
    }

    body::before {
      width: 340px;
      height: 340px;
      left: -170px;
      bottom: -130px;
      background: rgba(143, 14, 30, .12);
    }

    body::after {
      width: 280px;
      height: 280px;
      right: -120px;
      top: 36%;
      background: rgba(217, 164, 65, .14);
    }

    button { font: inherit; }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: 24px 18px 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-card {
      position: relative;
      width: 100%;
      min-height: min(820px, calc(100svh - 48px));
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.88);
      border-radius: var(--radius-xl);
      background: rgba(255, 252, 246, .87);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 8px;
      background: linear-gradient(90deg, var(--deep-red), var(--dbs-red), var(--gold), var(--dbs-red), var(--deep-red));
      z-index: 5;
    }

    .ornament {
      position: absolute;
      top: 26px;
      width: 112px;
      height: 112px;
      opacity: .09;
      background-image:
        linear-gradient(45deg, transparent 47%, var(--deep-red) 48% 52%, transparent 53%),
        linear-gradient(-45deg, transparent 47%, var(--deep-red) 48% 52%, transparent 53%);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle, #000 44%, transparent 72%);
      -webkit-mask-image: radial-gradient(circle, #000 44%, transparent 72%);
    }

    .ornament.left { left: -34px; }
    .ornament.right { right: -34px; transform: rotate(22deg); }

    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px 0;
      position: relative;
      z-index: 4;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: .06em;
      color: var(--deep-red);
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(145deg, var(--dbs-red), var(--deep-red));
      box-shadow: 0 8px 18px rgba(143,14,30,.25);
      font-family: Georgia, serif;
      font-size: 20px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 14px;
      color: var(--deep-red);
      background: rgba(143, 14, 30, .08);
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      transition: transform .2s ease, background .2s ease;
    }

    .icon-btn:hover { transform: translateY(-2px); background: rgba(143,14,30,.14); }

    body.fullscreen-mode .app-shell {
      width: 100%;
      max-width: none;
      min-height: 100svh;
      padding: 0;
      align-items: stretch;
    }

    body.fullscreen-mode .app-card {
      min-height: 100svh;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    body.fullscreen-mode .screen {
      width: min(100%, 720px);
      min-height: calc(100svh - 72px);
      margin: 0 auto;
    }

    .screen {
      display: none;
      min-height: calc(min(820px, calc(100svh - 48px)) - 72px);
      padding: 26px 26px 30px;
      animation: screenIn .5s cubic-bezier(.22,.8,.28,1) both;
    }

    .screen.active { display: flex; flex-direction: column; }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(12px) scale(.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      align-self: center;
      padding: 7px 12px;
      border: 1px solid rgba(143, 14, 30, .13);
      border-radius: 999px;
      color: var(--deep-red);
      background: rgba(255,255,255,.62);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dbs-red);
      box-shadow: 0 0 0 5px rgba(227,24,55,.1);
    }

    h1, h2, h3, p { margin-top: 0; }

    .hero-title {
      margin: 22px auto 12px;
      text-align: center;
      color: var(--wine);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: clamp(34px, 9vw, 48px);
      line-height: 1.18;
      letter-spacing: .055em;
    }

    .hero-title span {
      display: block;
      margin-top: 8px;
      color: var(--dbs-red);
      font-family: inherit;
      font-size: .42em;
      letter-spacing: .22em;
    }

    .hero-copy {
      max-width: 400px;
      margin: 0 auto;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
    }

    .altar {
      position: relative;
      width: 100%;
      height: 270px;
      margin: 14px auto 4px;
      display: grid;
      place-items: center;
      perspective: 900px;
    }

    .halo {
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      background:
        repeating-radial-gradient(circle, transparent 0 17px, rgba(217,164,65,.16) 18px 19px),
        radial-gradient(circle, rgba(245,217,140,.43), rgba(245,217,140,.06) 62%, transparent 70%);
      animation: haloBreath 4s ease-in-out infinite;
    }

    @keyframes haloBreath {
      50% { transform: scale(1.05) rotate(3deg); opacity: .72; }
    }

    .jiaobei-preview {
      position: relative;
      width: 230px;
      height: 160px;
      transform: rotate(-4deg);
    }

    .mini-piece {
      position: absolute;
      width: 112px;
      height: 64px;
      border-radius: 100% 15% 100% 22% / 100% 25% 100% 35%;
      background: linear-gradient(145deg, #e72b3f, #9b1021 68%, #6d0916);
      box-shadow: 0 18px 28px rgba(78, 7, 18, .25), inset 8px 8px 10px rgba(255,255,255,.16);
    }

    .mini-piece::after {
      content: "";
      position: absolute;
      inset: 9px 15px 14px 13px;
      border-radius: inherit;
      border: 2px solid rgba(255,229,174,.72);
      opacity: .7;
    }

    .mini-piece.one { left: 20px; top: 42px; transform: rotate(25deg); }
    .mini-piece.two { right: 10px; bottom: 23px; transform: rotate(154deg) scaleX(-1); }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      min-height: 56px;
      border-radius: 18px;
      border: 0;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: .06em;
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .primary-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--dbs-red), var(--deep-red));
      box-shadow: 0 14px 28px rgba(143,14,30,.27), inset 0 1px rgba(255,255,255,.22);
    }

    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 18px 34px rgba(143,14,30,.34); }
    .primary-btn:active { transform: translateY(1px) scale(.995); }
    .primary-btn:disabled { cursor: not-allowed; opacity: .48; box-shadow: none; }

    .secondary-btn {
      color: var(--deep-red);
      background: rgba(143,14,30,.08);
      border: 1px solid rgba(143,14,30,.1);
    }

    .tiny-note {
      margin: 12px 0 0;
      text-align: center;
      color: #9a8680;
      font-size: 11px;
      line-height: 1.6;
    }

    /* Casting stage */
    .casting-screen {
      align-items: center;
      justify-content: center;
    }

    .casting-title {
      margin: 22px 0 4px;
      color: var(--wine);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: 30px;
      letter-spacing: .08em;
    }

    .casting-copy { color: var(--muted); font-size: 13px; }

    .stage {
      position: relative;
      width: 100%;
      height: 360px;
      margin-top: 12px;
      display: grid;
      place-items: center;
      perspective: 1100px;
    }

    .stage-floor {
      position: absolute;
      width: 330px;
      height: 150px;
      top: 164px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse, rgba(83,16,26,.25), transparent 66%),
        repeating-radial-gradient(ellipse, rgba(217,164,65,.11) 0 2px, transparent 3px 16px);
      transform: rotateX(68deg);
      filter: blur(.15px);
    }

    .incense-smoke {
      position: absolute;
      left: 50%;
      bottom: 240px;
      width: 5px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(transparent, rgba(143,14,30,.18), transparent);
      filter: blur(4px);
      animation: smoke 2.8s ease-in-out infinite;
    }

    @keyframes smoke {
      0% { transform: translateX(-50%) translateY(10px) scaleX(.7); opacity: 0; }
      35% { opacity: .8; }
      100% { transform: translateX(-20%) translateY(-35px) scaleX(2.5); opacity: 0; }
    }

    .pieces {
      position: relative;
      width: 350px;
      height: 280px;
      transform-style: preserve-3d;
    }

    .piece {
      --rx: 0deg;
      --ry: 0deg;
      --rz: 0deg;
      position: absolute;
      top: 65px;
      width: 150px;
      height: 88px;
      transform-style: preserve-3d;
      transform: translate3d(0, 0, 0) rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(var(--rz));
      transition: transform .9s cubic-bezier(.18,.82,.22,1.15), top .9s ease, left .9s ease;
      filter: drop-shadow(0 18px 14px rgba(68, 8, 18, .26));
    }

    .piece.one { left: 20px; }
    .piece.two { right: 20px; }

    .piece svg { width: 100%; height: 100%; overflow: visible; }
    .piece .shell { fill: url(#woodGradientA); stroke: rgba(91,7,18,.8); stroke-width: 2; }
    .piece.two .shell { fill: url(#woodGradientB); }
    .piece .flat-surface { fill: url(#flatGradient); opacity: 0; transition: opacity .35s ease; }
    .piece .convex-surface { fill: url(#convexGradient); opacity: 1; transition: opacity .35s ease; }
    .piece .rim { fill: none; stroke: rgba(255,224,165,.58); stroke-width: 2.1; }
    .piece .shine { fill: rgba(255,255,255,.18); }

    .piece.face-flat .flat-surface { opacity: 1; }
    .piece.face-flat .convex-surface { opacity: 0; }
    .piece.face-convex .flat-surface { opacity: 0; }
    .piece.face-convex .convex-surface { opacity: 1; }

    .pieces.throwing .piece.one { animation: throwOne 1.9s cubic-bezier(.17,.84,.28,1) both; }
    .pieces.throwing .piece.two { animation: throwTwo 1.9s cubic-bezier(.17,.84,.28,1) both; }

    @keyframes throwOne {
      0% { transform: translate3d(32px, 90px, 0) rotateX(0) rotateY(0) rotateZ(18deg) scale(.82); }
      26% { transform: translate3d(88px, -95px, 120px) rotateX(190deg) rotateY(260deg) rotateZ(96deg) scale(1.02); }
      58% { transform: translate3d(10px, -15px, 70px) rotateX(430deg) rotateY(520deg) rotateZ(205deg); }
      78% { transform: translate3d(18px, 82px, 8px) rotateX(660deg) rotateY(680deg) rotateZ(310deg) scale(.97); }
      90% { transform: translate3d(8px, 54px, 2px) rotateX(680deg) rotateY(710deg) rotateZ(330deg) scale(1.02); }
      100% { transform: translate3d(0, 64px, 0) rotateX(720deg) rotateY(720deg) rotateZ(340deg); }
    }

    @keyframes throwTwo {
      0% { transform: translate3d(-32px, 92px, 0) rotateX(0) rotateY(0) rotateZ(-18deg) scale(.82); }
      24% { transform: translate3d(-82px, -108px, 130px) rotateX(-210deg) rotateY(280deg) rotateZ(-110deg) scale(1.04); }
      56% { transform: translate3d(18px, -20px, 76px) rotateX(-455deg) rotateY(510deg) rotateZ(-225deg); }
      78% { transform: translate3d(-16px, 78px, 8px) rotateX(-650deg) rotateY(690deg) rotateZ(-315deg) scale(.96); }
      90% { transform: translate3d(-8px, 55px, 2px) rotateX(-680deg) rotateY(710deg) rotateZ(-335deg) scale(1.03); }
      100% { transform: translate3d(0, 64px, 0) rotateX(-720deg) rotateY(720deg) rotateZ(-340deg); }
    }

    .casting-progress {
      width: min(300px, 82%);
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(143,14,30,.08);
    }

    .casting-progress::after {
      content: "";
      display: block;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, var(--dbs-red), var(--gold), transparent);
      animation: progressSweep 1.2s ease-in-out infinite;
    }

    @keyframes progressSweep { from { transform: translateX(-120%); } to { transform: translateX(350%); } }

    /* Result */
    .result-screen { align-items: center; text-align: center; }

    .result-seal {
      width: 84px;
      height: 84px;
      margin-top: 8px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255,255,255,.82);
      border-radius: 27px;
      color: #fff;
      background: linear-gradient(145deg, var(--dbs-red), var(--deep-red));
      box-shadow: 0 16px 30px rgba(143,14,30,.25), inset 0 0 0 7px rgba(255,255,255,.08);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: 40px;
      font-weight: 900;
      transform: rotate(-4deg);
      animation: sealPop .65s cubic-bezier(.2,.9,.2,1.25) both;
    }

    @keyframes sealPop { from { opacity: 0; transform: scale(.4) rotate(-18deg); } }

    .result-name {
      margin: 18px 0 8px;
      color: var(--wine);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: 38px;
      letter-spacing: .14em;
    }

    .result-tag {
      margin-bottom: 16px;
      padding: 7px 13px;
      border-radius: 999px;
      color: var(--deep-red);
      background: rgba(227,24,55,.09);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .result-visual {
      width: 100%;
      height: 190px;
      margin: 2px 0 10px;
      display: grid;
      place-items: center;
    }

    .result-mini-pieces {
      position: relative;
      width: 280px;
      height: 150px;
    }

    .result-mini {
      position: absolute;
      top: 36px;
      width: 130px;
      height: 76px;
      border-radius: 100% 15% 100% 22% / 100% 25% 100% 35%;
      background: linear-gradient(145deg, #e72b3f, #9b1021 68%, #6d0916);
      box-shadow: 0 18px 24px rgba(78,7,18,.24), inset 8px 8px 10px rgba(255,255,255,.16);
      transition: all .4s ease;
    }

    .result-mini::after {
      content: "";
      position: absolute;
      inset: 10px 17px 15px 14px;
      border-radius: inherit;
      border: 2px solid rgba(255,229,174,.72);
    }

    .result-mini.flat::before {
      content: "";
      position: absolute;
      inset: 7px 10px 9px;
      z-index: 0;
      border-radius: inherit;
      background: linear-gradient(145deg, #ffe2aa, #be7735 62%, #873d20);
      box-shadow: inset 3px 3px 7px rgba(255,255,255,.35);
    }

    .result-mini.flat::after { border-color: rgba(103,43,20,.48); }
    .result-mini.a { left: 4px; transform: rotate(24deg); }
    .result-mini.b { right: 4px; transform: rotate(154deg) scaleX(-1); }
    .result-mini.upright { width: 42px; height: 132px; top: 8px; border-radius: 22px 12px 22px 10px; }
    .result-mini.upright.a { left: 78px; transform: rotate(-5deg); }
    .result-mini.upright.b { right: 78px; transform: rotate(5deg); }

    .result-desc {
      max-width: 420px;
      min-height: 76px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.85;
    }

    .result-actions { width: 100%; margin-top: auto; }

    /* Quiz */
    .quiz-screen { justify-content: flex-start; }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .quiz-kicker {
      color: var(--dbs-red);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
    }

    .quiz-badge {
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--deep-red);
      background: rgba(143,14,30,.08);
      font-size: 11px;
      font-weight: 800;
    }

    .question-card {
      padding: 22px;
      border: 1px solid rgba(143,14,30,.09);
      border-radius: var(--radius-lg);
      background:
        linear-gradient(145deg, rgba(255,255,255,.88), rgba(255,248,236,.88));
      box-shadow: 0 12px 30px rgba(74,37,28,.08);
    }

    .question-number {
      margin-bottom: 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
    }

    .question-text {
      margin: 0;
      color: var(--wine);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: clamp(22px, 5.7vw, 29px);
      line-height: 1.5;
    }

    .options {
      display: grid;
      gap: 11px;
      margin: 18px 0 20px;
    }

    .option {
      position: relative;
      width: 100%;
      min-height: 58px;
      padding: 12px 48px 12px 52px;
      border: 1px solid rgba(143,14,30,.11);
      border-radius: 16px;
      color: var(--ink);
      background: rgba(255,255,255,.72);
      text-align: left;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .option:hover { transform: translateY(-1px); border-color: rgba(227,24,55,.35); box-shadow: 0 8px 20px rgba(91,12,25,.08); }

    .option-letter {
      position: absolute;
      left: 13px;
      top: 50%;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      color: var(--deep-red);
      background: rgba(143,14,30,.08);
      font-size: 12px;
      font-weight: 900;
      transform: translateY(-50%);
    }

    .option.selected {
      border-color: var(--dbs-red);
      background: rgba(227,24,55,.07);
      box-shadow: 0 0 0 3px rgba(227,24,55,.08);
    }

    .option.selected .option-letter { color: #fff; background: var(--dbs-red); }
    .option.correct { border-color: var(--green); background: rgba(31,122,85,.09); }
    .option.correct .option-letter { color: #fff; background: var(--green); }
    .option.wrong { border-color: var(--dbs-red); background: rgba(227,24,55,.08); }
    .option:disabled { cursor: default; transform: none; }

    .feedback {
      display: none;
      margin-bottom: 18px;
      padding: 16px 17px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 13px;
    }

    .feedback.show { display: block; animation: screenIn .35s ease both; }
    .feedback.correct { color: #135d42; background: rgba(31,122,85,.09); border: 1px solid rgba(31,122,85,.16); }
    .feedback.wrong { color: #8f0e1e; background: rgba(227,24,55,.08); border: 1px solid rgba(227,24,55,.14); }
    .feedback strong { display: block; margin-bottom: 4px; font-size: 15px; }

    .quiz-actions { margin-top: auto; }

    /* Reward modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(40, 5, 11, .56);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-backdrop.show { display: grid; animation: fadeIn .35s ease both; }
    @keyframes fadeIn { from { opacity: 0; } }

    .reward-modal {
      position: relative;
      width: min(100%, 430px);
      overflow: hidden;
      padding: 32px 26px 26px;
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 28px;
      text-align: center;
      background: linear-gradient(160deg, #fffdf7, #f8ead7 58%, #f7dfe3);
      box-shadow: 0 28px 80px rgba(31,2,8,.38);
      animation: modalPop .6s cubic-bezier(.2,.9,.2,1.15) both;
    }

    @keyframes modalPop { from { opacity: 0; transform: translateY(28px) scale(.88); } }

    .reward-icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(145deg, var(--gold), #b8781c);
      box-shadow: 0 14px 30px rgba(180,116,24,.3), inset 0 0 0 8px rgba(255,255,255,.13);
      font-size: 42px;
      animation: rewardFloat 2s ease-in-out infinite;
    }

    @keyframes rewardFloat { 50% { transform: translateY(-6px) rotate(4deg); } }

    .reward-modal h2 {
      margin-bottom: 8px;
      color: var(--wine);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: 32px;
    }

    .reward-ticket {
      position: relative;
      margin: 20px 0;
      padding: 18px;
      border: 1px dashed rgba(143,14,30,.33);
      border-radius: 18px;
      color: var(--deep-red);
      background: rgba(255,255,255,.62);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .06em;
    }

    .reward-ticket::before,
    .reward-ticket::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f7e7d7;
      transform: translateY(-50%);
    }

    .reward-ticket::before { left: -11px; }
    .reward-ticket::after { right: -11px; }

    .reward-modal p { color: var(--muted); font-size: 13px; line-height: 1.7; }

    .confetti-layer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .confetti {
      position: absolute;
      top: -18px;
      width: 9px;
      height: 16px;
      border-radius: 3px;
      background: var(--dbs-red);
      animation: confettiFall 2.8s linear infinite;
    }

    @keyframes confettiFall {
      to { transform: translate3d(var(--drift, 30px), 530px, 0) rotate(720deg); opacity: .1; }
    }

    /* Debug */
    .debug-panel {
      display: none;
      position: fixed;
      z-index: 100;
      left: 10px;
      bottom: 10px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(30,20,20,.88);
      color: white;
      font-size: 11px;
    }

    .debug-panel.show { display: flex; gap: 5px; flex-wrap: wrap; max-width: 320px; }
    .debug-panel button { border: 0; border-radius: 7px; padding: 5px 7px; cursor: pointer; }

    @media (max-width: 520px) {
      .app-shell { padding: 0; }
      .app-card { min-height: 100svh; border-radius: 0; border: 0; }
      .screen { min-height: calc(100svh - 72px); padding: 22px 20px 26px; }
      .topbar { padding-left: 19px; padding-right: 19px; }
      .altar { height: 245px; }
      .stage { height: 330px; transform: scale(.92); margin-top: -4px; }
      .question-card { padding: 19px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="app-card" aria-live="polite">
      <div class="ornament left"></div>
      <div class="ornament right"></div>

      <header class="topbar">
        <div class="brand" aria-label="星願擲筊所">
          <div class="brand-mark">願</div>
          <span>星願擲筊所</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="fullscreenToggle" aria-label="進入全螢幕" title="進入全螢幕">⛶</button>
          <button class="icon-btn" id="soundToggle" aria-label="切換音效" title="切換音效">♪</button>
        </div>
      </header>

      <!-- 首頁 -->
      <section class="screen active" id="homeScreen">
        <div class="eyebrow">DBS KNOWLEDGE LUCKY DRAW</div>
        <h1 class="hero-title">星展知識擲筊<span>問答・祈願・抽運勢</span></h1>
        <p class="hero-copy">誠心擲下筊杯，看看今天的指引。抽到聖筊可直接前往運勢抽籤，其餘結果完成一題星展知識挑戰後，也能進入運勢籤筒。</p>

        <div class="altar" aria-hidden="true">
          <div class="halo"></div>
          <div class="jiaobei-preview">
            <div class="mini-piece one"></div>
            <div class="mini-piece two"></div>
          </div>
        </div>

        <button class="primary-btn" id="startBtn">開始擲筊</button>
        <p class="tiny-note">每次結果皆獨立隨機｜完成本階段後即可前往運勢抽籤</p>
      </section>

      <!-- 擲筊動畫 -->
      <section class="screen casting-screen" id="castingScreen">
        <div class="eyebrow">虔心請示中</div>
        <h2 class="casting-title">擲筊中⋯</h2>
        <p class="casting-copy" id="castingCopy">靜候筊杯落定</p>

        <div class="stage" aria-label="擲筊動畫">
          <div class="incense-smoke"></div>
          <div class="stage-floor"></div>
          <div class="pieces" id="pieces">
            <div class="piece one face-convex" id="pieceOne">
              <svg viewBox="0 0 180 105" role="img" aria-label="筊杯一">
                <defs>
                  <linearGradient id="woodGradientA" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#ef4051"/><stop offset=".52" stop-color="#b3142a"/><stop offset="1" stop-color="#6f0817"/>
                  </linearGradient>
                  <linearGradient id="flatGradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#ffe7b6"/><stop offset=".55" stop-color="#c77a35"/><stop offset="1" stop-color="#7a301b"/>
                  </linearGradient>
                  <linearGradient id="convexGradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#f34858"/><stop offset=".6" stop-color="#a90f24"/><stop offset="1" stop-color="#650512"/>
                  </linearGradient>
                </defs>
                <path class="shell" d="M13,80 C12,35 47,10 89,12 C132,14 165,38 167,78 C136,97 52,102 13,80Z"/>
                <path class="flat-surface" d="M24,75 C25,42 52,24 88,24 C124,24 151,43 155,72 C126,85 57,89 24,75Z"/>
                <path class="convex-surface" d="M22,76 C20,42 50,19 89,20 C128,20 158,43 157,75 C123,94 55,94 22,76Z"/>
                <path class="rim" d="M22,76 C20,42 50,19 89,20 C128,20 158,43 157,75"/>
                <ellipse class="shine" cx="64" cy="38" rx="32" ry="10" transform="rotate(-12 64 38)"/>
              </svg>
            </div>

            <div class="piece two face-convex" id="pieceTwo">
              <svg viewBox="0 0 180 105" role="img" aria-label="筊杯二">
                <defs>
                  <linearGradient id="woodGradientB" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#f04a59"/><stop offset=".5" stop-color="#b9152b"/><stop offset="1" stop-color="#680713"/>
                  </linearGradient>
                </defs>
                <path class="shell" d="M13,80 C12,35 47,10 89,12 C132,14 165,38 167,78 C136,97 52,102 13,80Z"/>
                <path class="flat-surface" d="M24,75 C25,42 52,24 88,24 C124,24 151,43 155,72 C126,85 57,89 24,75Z"/>
                <path class="convex-surface" d="M22,76 C20,42 50,19 89,20 C128,20 158,43 157,75 C123,94 55,94 22,76Z"/>
                <path class="rim" d="M22,76 C20,42 50,19 89,20 C128,20 158,43 157,75"/>
                <ellipse class="shine" cx="64" cy="38" rx="32" ry="10" transform="rotate(-12 64 38)"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="casting-progress" aria-hidden="true"></div>
      </section>

      <!-- 結果 -->
      <section class="screen result-screen" id="resultScreen">
        <div class="result-seal" id="resultSeal">聖</div>
        <h2 class="result-name" id="resultName">聖筊</h2>
        <div class="result-tag" id="resultTag">吉兆・允准</div>

        <div class="result-visual" aria-hidden="true">
          <div class="result-mini-pieces" id="resultMiniPieces">
            <div class="result-mini a flat" id="resultPieceA"></div>
            <div class="result-mini b" id="resultPieceB"></div>
          </div>
        </div>

        <p class="result-desc" id="resultDescription"></p>

        <div class="result-actions">
          <button class="primary-btn" id="resultActionBtn">前往運勢抽籤</button>
          <button class="secondary-btn" id="castAgainBtn" style="margin-top:10px; display:none;">重新擲筊</button>
        </div>
      </section>

      <!-- 問答 -->
      <section class="screen quiz-screen" id="quizScreen">
        <div class="quiz-header">
          <div>
            <div class="quiz-kicker">DBS KNOWLEDGE CHALLENGE</div>
            <h2 style="margin:6px 0 0; color:var(--wine); font-size:26px;">星展知識挑戰</h2>
          </div>
          <div class="quiz-badge" id="quizOutcomeBadge">陰筊題庫</div>
        </div>

        <article class="question-card">
          <div class="question-number" id="questionNumber">QUESTION 01</div>
          <h3 class="question-text" id="questionText"></h3>
        </article>

        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>

        <div class="quiz-actions">
          <button class="primary-btn" id="submitAnswerBtn" disabled>確認答案</button>
        </div>
      </section>
    </section>
  </main>

  <!-- 運勢抽籤銜接彈窗 -->
  <div class="modal-backdrop" id="rewardModal" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
    <div class="reward-modal">
      <div class="confetti-layer" id="confettiLayer"></div>
      <div class="reward-icon">福</div>
      <h2 id="rewardTitle">準備前往運勢抽籤</h2>
      <p id="rewardSubtitle">擲筊與星展知識挑戰已完成，下一站前往運勢籤筒。</p>
      <div class="reward-ticket" id="rewardText">運勢籤筒已為你開啟</div>
      <button class="primary-btn" id="claimAndReturnBtn">前往運勢抽籤</button>
    </div>
  </div>

  <!-- 加上 ?debug=1 可顯示結果測試按鈕 -->
  <div class="debug-panel" id="debugPanel">
    測試結果：
    <button data-force="sheng">聖</button>
    <button data-force="xiao">笑</button>
    <button data-force="yin">陰</button>
    <button data-force="li">立</button>
  </div>

  <script>
    /* ==========================================================
       最常需要修改的設定區
       ========================================================== */
    const APP_CONFIG = {
      fortuneText: "運勢籤筒已為你開啟",
      fortuneSubtitle: "擲筊與星展知識挑戰已完成，下一站前往運勢籤筒。",
      // 若已有運勢抽籤頁面，請在引號內填入網址，例如："fortune-draw.html"
      // 保持空白時，點擊「前往運勢抽籤」會返回擲筊首頁。
      fortuneDrawUrl: "",
      castingDurationMs: 2450,
      soundEnabled: true
    };

    // 四種結果各 25%。調整 weight 即可改機率，總和請維持 1。
    const OUTCOMES = {
      sheng: {
        name: "聖筊",
        seal: "聖",
        tag: "吉兆・允准",
        weight: 0.25,
        description: "一平一凸，象徵神明同意、可行或為吉兆。今天好運直接降臨，不需答題即可前往運勢抽籤！",
        faces: ["flat", "convex"],
        action: "reward"
      },
      xiao: {
        name: "笑筊",
        seal: "笑",
        tag: "笑而不答・再思考",
        weight: 0.25,
        description: "兩面皆平，象徵神明笑而不答，或問題還不夠清楚。完成一題星展知識挑戰後，即可前往運勢抽籤。",
        faces: ["flat", "flat"],
        action: "quiz",
        questionPool: ["q3", "q4"]
      },
      yin: {
        name: "陰筊",
        seal: "陰",
        tag: "暫緩・重新評估",
        weight: 0.25,
        description: "兩面皆凸，象徵否定或時機未到。別氣餒，完成一題星展知識挑戰後，一樣能前往運勢抽籤。",
        faces: ["convex", "convex"],
        action: "quiz",
        questionPool: ["q1", "q2"]
      },
      li: {
        name: "立筊",
        seal: "立",
        tag: "罕見・驚喜指引",
        weight: 0.25,
        description: "筊杯立起，是十分特別的景象。接受一題星展知識挑戰，解鎖今天的運勢籤筒。",
        faces: ["upright", "upright"],
        action: "quiz",
        questionPool: ["q5", "q6"]
      }
    };

    // 題庫：陰筊 q1/q2、笑筊 q3/q4、立筊 q5/q6。
    // correct 使用 0～3，分別代表 A～D。
    const QUESTIONS = {
      q1: {
        text: "星展集團的總部設在哪一個國家？",
        options: ["新加坡", "日本", "英國", "澳洲"],
        correct: 0,
        explanation: "星展集團總部設於新加坡，並於當地上市。"
      },
      q2: {
        text: "依星展官方資料，星展集團目前業務遍及多少個市場？",
        options: ["8 個", "12 個", "19 個", "30 個"],
        correct: 2,
        explanation: "星展官方資料指出，集團業務遍及 19 個市場。"
      },
      q3: {
        text: "註冊星展 digibank 網路／行動銀行時，官方流程包含哪一項安全驗證？",
        options: ["OTP 簡訊動態密碼", "紙本支票驗證", "社群帳號驗證", "視訊面試"],
        correct: 0,
        explanation: "完成帳戶與安全驗證後，註冊流程包含 OTP（簡訊動態密碼）驗證。"
      },
      q4: {
        text: "星展 Card+ 的主要定位為何？",
        options: ["只提供外幣現鈔預約", "一站式信用卡與信貸數位服務", "企業薪資系統", "股票研究平台"],
        correct: 1,
        explanation: "星展 Card+ 提供一站式信用卡與信貸服務，協助管理日常帳務支出。"
      },
      q5: {
        text: "星展所稱的「永續連結貸款」，貸款條件主要與什麼連結？",
        options: ["客戶生日", "分行距離", "ESG 相關指標績效", "信用卡張數"],
        correct: 2,
        explanation: "永續連結貸款會將貸款利率與 ESG 相關指標績效連結。"
      },
      q6: {
        text: "星展集團積極開拓的亞洲三大成長區域，不包含下列何者？",
        options: ["大中華", "東南亞", "南亞", "北歐"],
        correct: 3,
        explanation: "星展官方資料列出的三大成長區域為大中華、東南亞與南亞。"
      }
    };

    /* ==========================================================
       App 狀態與 DOM
       ========================================================== */
    const screens = {
      home: document.getElementById("homeScreen"),
      casting: document.getElementById("castingScreen"),
      result: document.getElementById("resultScreen"),
      quiz: document.getElementById("quizScreen")
    };

    const startBtn = document.getElementById("startBtn");
    const pieces = document.getElementById("pieces");
    const pieceOne = document.getElementById("pieceOne");
    const pieceTwo = document.getElementById("pieceTwo");
    const castingCopy = document.getElementById("castingCopy");
    const resultSeal = document.getElementById("resultSeal");
    const resultName = document.getElementById("resultName");
    const resultTag = document.getElementById("resultTag");
    const resultDescription = document.getElementById("resultDescription");
    const resultActionBtn = document.getElementById("resultActionBtn");
    const castAgainBtn = document.getElementById("castAgainBtn");
    const resultPieceA = document.getElementById("resultPieceA");
    const resultPieceB = document.getElementById("resultPieceB");
    const resultMiniPieces = document.getElementById("resultMiniPieces");
    const quizOutcomeBadge = document.getElementById("quizOutcomeBadge");
    const questionNumber = document.getElementById("questionNumber");
    const questionText = document.getElementById("questionText");
    const optionsEl = document.getElementById("options");
    const feedback = document.getElementById("feedback");
    const submitAnswerBtn = document.getElementById("submitAnswerBtn");
    const rewardModal = document.getElementById("rewardModal");
    const rewardText = document.getElementById("rewardText");
    const rewardSubtitle = document.getElementById("rewardSubtitle");
    const claimAndReturnBtn = document.getElementById("claimAndReturnBtn");
    const confettiLayer = document.getElementById("confettiLayer");
    const fullscreenToggle = document.getElementById("fullscreenToggle");
    const soundToggle = document.getElementById("soundToggle");
    const debugPanel = document.getElementById("debugPanel");

    let currentOutcomeKey = null;
    let currentQuestionKey = null;
    let selectedAnswer = null;
    let answerSubmitted = false;
    let forcedOutcome = null;
    let audioContext = null;

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // 使用 crypto API 取得較均勻的 0～1 隨機值。
    function secureRandom() {
      if (window.crypto?.getRandomValues) {
        const arr = new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return arr[0] / 4294967296;
      }
      return Math.random();
    }

    function randomItem(items) {
      return items[Math.floor(secureRandom() * items.length)];
    }

    function getRandomOutcome() {
      if (forcedOutcome) {
        const selected = forcedOutcome;
        forcedOutcome = null;
        return selected;
      }

      const roll = secureRandom();
      let cumulative = 0;
      for (const [key, outcome] of Object.entries(OUTCOMES)) {
        cumulative += outcome.weight;
        if (roll < cumulative) return key;
      }
      return "li";
    }

    function resetPieceClasses() {
      [pieceOne, pieceTwo].forEach(piece => {
        piece.classList.remove("face-flat", "face-convex");
        piece.classList.add("face-convex");
        piece.style.removeProperty("--rx");
        piece.style.removeProperty("--ry");
        piece.style.removeProperty("--rz");
      });
    }

    function castJiaobei() {
      currentOutcomeKey = getRandomOutcome();
      currentQuestionKey = null;
      selectedAnswer = null;
      answerSubmitted = false;

      showScreen("casting");
      castingCopy.textContent = "靜候筊杯落定";
      resetPieceClasses();
      pieces.classList.remove("throwing");
      void pieces.offsetWidth;
      pieces.classList.add("throwing");
      playThrowSound();

      const messages = ["誠心請示中⋯", "好運正在翻轉⋯", "筊杯即將落定⋯"];
      let messageIndex = 0;
      const messageTimer = setInterval(() => {
        castingCopy.textContent = messages[messageIndex % messages.length];
        messageIndex += 1;
      }, 650);

      setTimeout(() => {
        clearInterval(messageTimer);
        pieces.classList.remove("throwing");
        applyFinalPiecePose(currentOutcomeKey);
        playLandingSound();
      }, 1900);

      setTimeout(() => {
        renderResult(currentOutcomeKey);
        showScreen("result");
        playResultChime(currentOutcomeKey === "sheng");
      }, APP_CONFIG.castingDurationMs);
    }

    function applyFinalPiecePose(key) {
      const outcome = OUTCOMES[key];
      const poses = {
        sheng: [
          { face: "flat", rx: "10deg", ry: "-8deg", rz: "18deg" },
          { face: "convex", rx: "-7deg", ry: "6deg", rz: "158deg" }
        ],
        xiao: [
          { face: "flat", rx: "8deg", ry: "-5deg", rz: "22deg" },
          { face: "flat", rx: "-5deg", ry: "7deg", rz: "156deg" }
        ],
        yin: [
          { face: "convex", rx: "9deg", ry: "-5deg", rz: "20deg" },
          { face: "convex", rx: "-5deg", ry: "5deg", rz: "160deg" }
        ],
        li: [
          { face: "convex", rx: "76deg", ry: "4deg", rz: "-8deg" },
          { face: "convex", rx: "78deg", ry: "-4deg", rz: "10deg" }
        ]
      };

      [pieceOne, pieceTwo].forEach((piece, i) => {
        piece.classList.remove("face-flat", "face-convex");
        piece.classList.add(`face-${poses[key][i].face}`);
        piece.style.setProperty("--rx", poses[key][i].rx);
        piece.style.setProperty("--ry", poses[key][i].ry);
        piece.style.setProperty("--rz", poses[key][i].rz);
        piece.style.top = key === "li" ? "115px" : "130px";
      });
    }

    function renderResult(key) {
      const outcome = OUTCOMES[key];
      resultSeal.textContent = outcome.seal;
      resultName.textContent = outcome.name;
      resultTag.textContent = outcome.tag;
      resultDescription.textContent = outcome.description;
      resultActionBtn.textContent = outcome.action === "reward" ? "前往運勢抽籤" : "查看問題";
      renderMiniPieces(outcome.faces);
    }

    function renderMiniPieces(faces) {
      resultPieceA.className = "result-mini a";
      resultPieceB.className = "result-mini b";
      resultMiniPieces.classList.remove("upright-mode");

      if (faces[0] === "upright") {
        resultPieceA.classList.add("upright");
        resultPieceB.classList.add("upright");
      } else {
        resultPieceA.classList.add(faces[0]);
        resultPieceB.classList.add(faces[1]);
      }
    }

    function openQuiz() {
      const outcome = OUTCOMES[currentOutcomeKey];
      currentQuestionKey = randomItem(outcome.questionPool);
      const question = QUESTIONS[currentQuestionKey];
      selectedAnswer = null;
      answerSubmitted = false;

      quizOutcomeBadge.textContent = `${outcome.name}題庫`;
      questionNumber.textContent = `QUESTION ${currentQuestionKey.replace("q", "").padStart(2, "0")}`;
      questionText.textContent = question.text;
      feedback.className = "feedback";
      feedback.innerHTML = "";
      submitAnswerBtn.disabled = true;
      submitAnswerBtn.textContent = "確認答案";
      optionsEl.innerHTML = "";

      question.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "option";
        button.type = "button";
        button.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + index)}</span>${option}`;
        button.addEventListener("click", () => selectAnswer(index));
        optionsEl.appendChild(button);
      });

      showScreen("quiz");
    }

    function selectAnswer(index) {
      if (answerSubmitted) return;
      selectedAnswer = index;
      [...optionsEl.children].forEach((el, i) => el.classList.toggle("selected", i === index));
      submitAnswerBtn.disabled = false;
    }

    function submitAnswer() {
      if (selectedAnswer === null || answerSubmitted) return;
      answerSubmitted = true;

      const question = QUESTIONS[currentQuestionKey];
      const isCorrect = selectedAnswer === question.correct;
      const optionButtons = [...optionsEl.children];

      optionButtons.forEach((button, index) => {
        button.disabled = true;
        if (index === question.correct) button.classList.add("correct");
        if (index === selectedAnswer && !isCorrect) button.classList.add("wrong");
      });

      feedback.className = `feedback show ${isCorrect ? "correct" : "wrong"}`;
      feedback.innerHTML = `
        <strong>${isCorrect ? "答對了！知識與好運同步加分" : "差一點！答案已為你揭曉"}</strong>
        ${question.explanation}<br>無論答對或答錯，都可以前往運勢抽籤。
      `;
      submitAnswerBtn.textContent = "前往運勢抽籤";
      playAnswerTone(isCorrect);
    }

    function openReward() {
      rewardText.textContent = APP_CONFIG.fortuneText;
      rewardSubtitle.textContent = APP_CONFIG.fortuneSubtitle;
      createConfetti();
      rewardModal.classList.add("show");
      document.body.style.overflow = "hidden";
      playRewardFanfare();
    }

    function closeRewardAndReset() {
      rewardModal.classList.remove("show");
      document.body.style.overflow = "";
      pieces.classList.remove("throwing");
      currentOutcomeKey = null;
      currentQuestionKey = null;
      selectedAnswer = null;
      answerSubmitted = false;
      showScreen("home");
    }

    function createConfetti() {
      const colors = ["#e31837", "#8f0e1e", "#d9a441", "#f5d98c", "#ffffff"];
      confettiLayer.innerHTML = "";
      for (let i = 0; i < 34; i += 1) {
        const bit = document.createElement("span");
        bit.className = "confetti";
        bit.style.left = `${secureRandom() * 100}%`;
        bit.style.background = colors[Math.floor(secureRandom() * colors.length)];
        bit.style.animationDelay = `${secureRandom() * 1.7}s`;
        bit.style.animationDuration = `${2 + secureRandom() * 1.8}s`;
        bit.style.setProperty("--drift", `${-55 + secureRandom() * 110}px`);
        bit.style.transform = `rotate(${secureRandom() * 180}deg)`;
        confettiLayer.appendChild(bit);
      }
    }

    /* ==========================================================
       純瀏覽器合成音效，不需外部音檔
       ========================================================== */
    function getAudioContext() {
      if (!APP_CONFIG.soundEnabled) return null;
      if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        audioContext = new AudioCtx();
      }
      if (audioContext.state === "suspended") audioContext.resume();
      return audioContext;
    }

    function tone(freq, start, duration, type = "sine", volume = .055) {
      const ctx = getAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(volume, ctx.currentTime + start + .015);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration + .02);
    }

    function noiseBurst(start, duration, volume = .04, frequency = 900) {
      const ctx = getAudioContext();
      if (!ctx) return;

      const frameCount = Math.max(1, Math.floor(ctx.sampleRate * duration));
      const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < frameCount; i += 1) {
        const fade = 1 - i / frameCount;
        data[i] = (secureRandom() * 2 - 1) * fade;
      }

      const source = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      const gain = ctx.createGain();
      source.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.value = frequency;
      filter.Q.value = .8;
      gain.gain.setValueAtTime(volume, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + start + duration);
      source.connect(filter).connect(gain).connect(ctx.destination);
      source.start(ctx.currentTime + start);
    }

    function woodKnock(start, strength = 1) {
      tone(145 * strength, start, .10, "triangle", .075);
      tone(82 * strength, start + .012, .15, "sine", .055);
      noiseBurst(start, .075, .045, 720 * strength);
    }

    function playThrowSound() {
      // 模擬兩枚筊杯在空中翻轉、互相碰撞的木質聲響。
      noiseBurst(0, .22, .035, 1250);
      [0, .16, .33, .51, .70, .90, 1.11, 1.34, 1.56, 1.74].forEach((time, index) => {
        woodKnock(time, .88 + (index % 3) * .09);
      });
      tone(210, .05, .28, "triangle", .025);
      tone(270, .58, .24, "triangle", .022);
      tone(330, 1.18, .20, "triangle", .018);
    }

    function playLandingSound() {
      // 落地時兩次較沉的碰撞，讓筊杯落定更有臨場感。
      woodKnock(0, .82);
      woodKnock(.105, .68);
      noiseBurst(0, .24, .055, 430);
      tone(68, .025, .30, "sine", .07);
    }

    function playResultChime(isSheng) {
      const notes = isSheng ? [523.25, 659.25, 783.99] : [392, 493.88];
      notes.forEach((freq, i) => tone(freq, i * .14, .55, "sine", .045));
    }

    function playAnswerTone(isCorrect) {
      const notes = isCorrect ? [523.25, 659.25] : [293.66, 261.63];
      notes.forEach((freq, i) => tone(freq, i * .13, .35, "sine", .04));
    }

    function playRewardFanfare() {
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => tone(freq, i * .11, .65, "sine", .045));
    }

    /* ==========================================================
       事件
       ========================================================== */
    startBtn.addEventListener("click", castJiaobei);

    resultActionBtn.addEventListener("click", () => {
      if (OUTCOMES[currentOutcomeKey].action === "reward") openReward();
      else openQuiz();
    });

    castAgainBtn.addEventListener("click", castJiaobei);

    submitAnswerBtn.addEventListener("click", () => {
      if (!answerSubmitted) submitAnswer();
      else openReward();
    });

    claimAndReturnBtn.addEventListener("click", () => {
      const nextUrl = APP_CONFIG.fortuneDrawUrl.trim();
      if (nextUrl) {
        window.location.href = nextUrl;
        return;
      }
      closeRewardAndReset();
    });

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          const target = document.documentElement;
          if (target.requestFullscreen) await target.requestFullscreen();
          else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        } else if (document.exitFullscreen) {
          await document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      } catch (error) {
        console.warn("無法切換全螢幕：", error);
      }
    }

    function syncFullscreenUI() {
      const isFullscreen = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
      document.body.classList.toggle("fullscreen-mode", isFullscreen);
      fullscreenToggle.textContent = isFullscreen ? "×" : "⛶";
      fullscreenToggle.setAttribute("aria-label", isFullscreen ? "離開全螢幕" : "進入全螢幕");
      fullscreenToggle.title = isFullscreen ? "離開全螢幕" : "進入全螢幕";
    }

    fullscreenToggle.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", syncFullscreenUI);
    document.addEventListener("webkitfullscreenchange", syncFullscreenUI);

    soundToggle.addEventListener("click", () => {
      APP_CONFIG.soundEnabled = !APP_CONFIG.soundEnabled;
      soundToggle.textContent = APP_CONFIG.soundEnabled ? "♪" : "×";
      soundToggle.setAttribute("aria-label", APP_CONFIG.soundEnabled ? "關閉音效" : "開啟音效");
      if (APP_CONFIG.soundEnabled) tone(660, 0, .25, "sine", .04);
    });

    // 測試模式：網址最後加上 ?debug=1，可指定下一次結果。
    if (new URLSearchParams(location.search).get("debug") === "1") {
      debugPanel.classList.add("show");
      debugPanel.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          forcedOutcome = button.dataset.force;
          castJiaobei();
        });
      });
    }
  </script>
</body>
